<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
    <title>Sickle Wavelength Explorer</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src='aladin.js' charset='utf-8' defer></script>
    <script type="text/javascript" src="draggable.js"></script>
    <script type="text/javascript" src="tour-common.js"></script>
    <script type="text/javascript" src="wavelength-slider.js"></script>
    <link rel="stylesheet" href="default.css">
    <link rel="stylesheet" href="draggable.css">
    <link rel="stylesheet" href="tour-common.css">
    <link rel="stylesheet" href="wavelength-slider.css">
</head>

<body>
    <div id="aladin-lite-div"></div>

    <div id="loading-div">Loading Sickle Wavelength Explorer... Please wait.</div>

    <div id="waypoint-info" style="display: none;">
        <div id="waypoint-header">
            <button id="expand-btn" title="Expand/Collapse Info">▶</button>
            <h2 id="waypoint-title">Sickle Wavelength Explorer</h2>
        </div>
        <div id="waypoint-content">
            <p id="waypoint-description">Linear wavelength composites for the Sickle.</p>
        </div>
    </div>

    <div id="progress-container">
        <div id="progress-bar">
            <div id="progress"></div>
        </div>
        <span id="current-waypoint">1/1</span>
    </div>

    <div id="tour-controls" style="display: none;">
        <button id="prev-btn" title="Previous" disabled>‹</button>
        <button id="next-btn" title="Next" disabled>›</button>
        <button id="start-btn" title="Start/Play Tour" disabled>▶</button>
        <button id="reset-btn" title="Reset">⟲</button>
        <button id="share-btn" title="Copy shareable link to current waypoint">🔗</button>
        <button id="scale-toggle-btn" title="Switch between linear and log-stretched versions">Mode: Linear</button>
        <select id="waypoint-dropdown" title="Jump to waypoint"
            style="background-color: #2962FF; color: white; border: none; padding: 12px 6px; border-radius: 8px; margin: 0 3px; cursor: pointer; font-size: 16px; position: relative; z-index: 120; width: 36px; text-align: center; -webkit-appearance: none; -moz-appearance: none; appearance: none;">
            <option value="">≫</option>
        </select>
        <select id="speed-dropdown" title="Tour speed: 1× = normal, 2× = double speed, 4× = quadruple speed"
            style="background-color: #2962FF; color: white; border: none; padding: 12px 6px; border-radius: 8px; margin: 0 3px; cursor: pointer; font-size: 16px; position: relative; z-index: 120; width: 42px; text-align: center; -webkit-appearance: none; -moz-appearance: none; appearance: none;">
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
        </select>
    </div>

    <div id="countdown-timer" style="display: none;">
        <span id="countdown-text">Next in: </span>
        <span id="countdown-value">5</span>
    </div>

    <button id="scale-toggle-floating-btn"
        title="Switch between linear and log-stretched versions"
        style="display: none; position: fixed; right: 20px; bottom: 20px; z-index: 2200; background: #2962FF; color: white; border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-size: 14px; font-weight: bold;">
        Mode: Linear
    </button>

    <div id="wavelength-slider-placeholder"></div>

    <script>
        let sickleLinearWavelengths = [];
        let sickleLogWavelengths = [];
        let sickleScaleMode = 'linear';

        function updateScaleToggleButton() {
            const modeLabel = sickleScaleMode === 'linear' ? 'Linear' : 'Log';
            const controlsButton = document.getElementById('scale-toggle-btn');
            const floatingButton = document.getElementById('scale-toggle-floating-btn');
            if (controlsButton) {
                controlsButton.textContent = `Mode: ${modeLabel}`;
            }
            if (floatingButton) {
                floatingButton.textContent = `Mode: ${modeLabel}`;
            }
        }

        function handleScaleToggle() {
            if (sickleLogWavelengths.length === 0) {
                return;
            }
            sickleScaleMode = sickleScaleMode === 'linear' ? 'log' : 'linear';
            updateScaleToggleButton();
            renderSickleWavelengthSlider(true);
        }

        function getActiveSickleWavelengths() {
            if (sickleScaleMode === 'log' && sickleLogWavelengths.length > 0) {
                return sickleLogWavelengths;
            }
            return sickleLinearWavelengths;
        }

        function renderSickleWavelengthSlider(preserveSliderValue) {
            const placeholder = document.getElementById('wavelength-slider-placeholder');
            if (!placeholder) {
                return;
            }

            let sliderValue = 0;
            const oldSlider = document.getElementById('wavelength-slider');
            if (preserveSliderValue && oldSlider) {
                const parsed = parseFloat(oldSlider.value);
                if (Number.isFinite(parsed)) {
                    sliderValue = parsed;
                }
            }

            if (typeof stopWavelengthPlayback === 'function') {
                stopWavelengthPlayback();
            }
            if (typeof setAllWavelengthOpacities === 'function') {
                setAllWavelengthOpacities(0);
            }

            const activeWavelengths = getActiveSickleWavelengths().map((wavelength) => ({ ...wavelength }));
            if (activeWavelengths.length === 0) {
                return;
            }

            // Remove any existing slider DOM before reinitializing wavelength layers.
            // This prevents loadWavelengthLayers() from targeting a stale slider element.
            placeholder.innerHTML = '';

            initWavelengthSlider(activeWavelengths);
            placeholder.innerHTML = createWavelengthSliderHTML();

            const sliderContainer = document.getElementById('wavelength-slider-container');
            if (sliderContainer) {
                makeDraggable(sliderContainer);
            }
            initWavelengthSliderEventListeners();

            const slider = document.getElementById('wavelength-slider');
            if (slider) {
                const clampedValue = Math.min(Math.max(sliderValue, 0), activeWavelengths.length - 1);
                slider.value = clampedValue;
                requestAnimationFrame(() => {
                    onWavelengthSliderChange(clampedValue);
                });
            }

            showWavelengthSlider();
        }

        document.addEventListener('DOMContentLoaded', function () {
            loadWaypoints('waypoints_sickle_wavelength.json', {
                initialSurvey: 'Sickle_RGB_335-210-187_hips',
                onWaypointsLoaded: function (waypoints) {
                    if (!(waypoints && waypoints.length > 0 && waypoints[0].wavelength_slider)) {
                        return;
                    }

                    const config = waypoints[0].wavelength_slider;
                    if (!(config.enabled && config.wavelengths)) {
                        return;
                    }

                    sickleLinearWavelengths = config.wavelengths;
                    sickleLogWavelengths = config.log_wavelengths || [];

                    const scaleToggleButton = document.getElementById('scale-toggle-btn');
                    if (scaleToggleButton) {
                        scaleToggleButton.addEventListener('click', handleScaleToggle);
                    }

                    const floatingScaleToggleButton = document.getElementById('scale-toggle-floating-btn');
                    if (floatingScaleToggleButton) {
                        floatingScaleToggleButton.style.display = 'block';
                        floatingScaleToggleButton.addEventListener('click', handleScaleToggle);
                    }

                    updateScaleToggleButton();

                    const initWavelengthSliderWhenReady = () => {
                        if (aladin) {
                            renderSickleWavelengthSlider(false);
                        } else {
                            setTimeout(initWavelengthSliderWhenReady, 500);
                        }
                    };

                    setTimeout(initWavelengthSliderWhenReady, 500);
                }
            });
        });
    </script>
</body>

</html>
